<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MN8 Manage{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f0e8;
            --panel: #fffdfa;
            --ink: #1e1d1a;
            --muted: #686057;
            --line: #d8d0c4;
            --accent: #0d6a5b;
            --accent-strong: #08483e;
            --warn-bg: #fff3dc;
            --warn-line: #d7b97e;
            --error-bg: #fbe7e5;
            --error-line: #c98279;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background: radial-gradient(circle at top left, #fff9ef, #f4f0e8 45%, #e6dece 100%);
        }

        .shell {
            width: min(1180px, calc(100% - 32px));
            margin: 28px auto 48px;
        }

        .masthead,
        .panel {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--panel);
            box-shadow: 0 12px 28px rgba(38, 31, 22, 0.07);
        }

        .masthead {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: end;
            padding: 22px 24px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, rgba(13, 106, 91, 0.09), rgba(255, 253, 250, 0.96));
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            font-size: clamp(1.8rem, 3vw, 2.6rem);
        }

        .subtitle {
            margin-top: 8px;
            color: var(--muted);
        }

        .user-badge {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(13, 106, 91, 0.09);
            color: var(--accent-strong);
            font-weight: 700;
            white-space: nowrap;
        }

        nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        nav a,
        .button,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
        }

        nav a.secondary,
        .button.secondary,
        button.secondary {
            background: transparent;
            color: var(--accent-strong);
        }

        a.token-link {
            color: inherit;
            text-decoration: none;
        }

        a.token-link:hover code,
        a.token-link:focus-visible code {
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .panel {
            padding: 22px 24px;
        }

        .notice,
        .warnings,
        .errors {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 14px;
        }

        .notice {
            border: 1px solid var(--warn-line);
            background: var(--warn-bg);
        }

        .warnings {
            border: 1px solid var(--warn-line);
            background: var(--warn-bg);
        }

        .errors {
            border: 1px solid var(--error-line);
            background: var(--error-bg);
        }

        .warnings ul,
        .errors ul {
            margin: 8px 0 0 18px;
            padding: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .row-state-invalid {
            background: #f8d9d6;
        }

        .row-state-active {
            background: #dff2df;
        }

        .row-state-future {
            background: #dcecff;
        }

        .row-state-past {
            background: #e7e7e7;
        }

        .copy-button {
            background: transparent;
            color: var(--accent-strong);
        }

        .copy-button.is-copied {
            background: rgba(13, 106, 91, 0.12);
            color: var(--accent-strong);
        }

        .invalid-hint {
            color: #9f2f2f;
            font-weight: 700;
        }

        form {
            margin: 0;
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fff;
            color: var(--ink);
            font: inherit;
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        code {
            padding: 2px 6px;
            border-radius: 999px;
            background: rgba(13, 106, 91, 0.09);
            color: var(--accent-strong);
        }

        .stack {
            display: grid;
            gap: 16px;
        }

        @media (max-width: 720px) {
            .masthead {
                flex-direction: column;
                align-items: start;
            }

            table,
            thead,
            tbody,
            tr,
            td,
            th {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                padding: 12px 0;
                border-bottom: 1px solid var(--line);
            }

            td {
                padding: 6px 0;
                border: 0;
            }

            td::before {
                content: attr(data-label);
                display: block;
                margin-bottom: 4px;
                color: var(--muted);
                font-weight: 700;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="masthead">
            <div>
                <h1>{% block page_heading %}MN8 Manage{% endblock %}</h1>
                <p class="subtitle">Pure HTML5 Flask application behind nginx authentication.</p>
            </div>
            <div class="user-badge">User: {{ current_user_name or 'not authenticated' }}</div>
        </header>

        <nav>
            <a href="{{ url_for('manage_index') }}">Main Page</a>
            <a class="secondary" href="{{ url_for('show_info') }}">Show Info</a>
        </nav>

        {% block content %}{% endblock %}
    </div>

    <script>
        document.addEventListener("click", async function (event) {
            const button = event.target.closest("[data-copy-text]");
            if (!button) {
                return;
            }

            const originalText = button.dataset.copyLabel || button.textContent.trim();
            const copyText = button.dataset.copyText;

            try {
                await navigator.clipboard.writeText(copyText);
                button.textContent = "COPIED";
                button.classList.add("is-copied");
                window.setTimeout(function () {
                    button.textContent = originalText;
                    button.classList.remove("is-copied");
                }, 1200);
            } catch (_error) {
                button.textContent = "FAILED";
                window.setTimeout(function () {
                    button.textContent = originalText;
                }, 1200);
            }
        });
    </script>
</body>
</html>
